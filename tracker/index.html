<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="..\css\tracker.css">
    <title>XyrisTracker</title>

</head>
<body>
    <div class="window">
        <div class="title-bar">
            <span>Scan Results</span>
        </div>
        <div class="content">
            <h2>XyrisTracker</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>File Size</th>
                        <th>File Name</th>
                        <th>File Hash</th>
                        <th>Scan Date</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="table-body">
             
                </tbody>
            </table>
        </div>
    </div>

    <script>
  async function loadTableData() {
    try {
        const response = await fetch('dump.json');
        const jsonData = await response.json();

        const tableBody = document.getElementById('table-body');
        
        // Clear existing content
        tableBody.innerHTML = '';

        // Process and populate table rows with JSON data
        for (const [userId, results] of Object.entries(jsonData)) {
            if (Array.isArray(results)) {
                results.forEach((result, index) => {
                    addRowToTable(tableBody, userId, index, result);
                });
            } else if (typeof results === 'object' && results !== null) {
                addRowToTable(tableBody, userId, 0, results);
            } else {
                console.warn(`Unexpected data structure for user ${userId}`);
            }
        }

        if (tableBody.children.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6">No valid data found.</td></tr>';
        }
    } catch (error) {
        console.error('Error loading table data:', error);
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '<tr><td colspan="6">Error loading data. Please check the console for details.</td></tr>';
    }
}

function addRowToTable(tableBody, userId, index, result) {
    const row = document.createElement('tr');
    
    const idCell = document.createElement('td');
    idCell.textContent = `${userId}-${index + 1}`;

    const sizeCell = document.createElement('td');
    sizeCell.textContent = result.file_size || 'N/A';

    const nameCell = document.createElement('td');
    nameCell.textContent = result.file_name || 'N/A';

    const hashCell = document.createElement('td');
    hashCell.textContent = result.file_hash || 'N/A';

    const timeCell = document.createElement('td');
    timeCell.textContent = result.scan_time || 'N/A';

    const resultCell = document.createElement('td');
    resultCell.textContent = result.result || 'N/A';
    
    row.appendChild(idCell);
    row.appendChild(sizeCell);
    row.appendChild(nameCell);
    row.appendChild(hashCell);
    row.appendChild(timeCell);
    row.appendChild(resultCell);
    
    tableBody.appendChild(row);
}

// Call loadTableData when the page loads
document.addEventListener('DOMContentLoaded', loadTableData);
    </script>
</body>
</html>
